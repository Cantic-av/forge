<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>FORGE</title>
<meta name="theme-color" content="#0B1220">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FORGE">
<link rel="apple-touch-icon" href="./icon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap');
  :root{
    --bg:#0A1018;--bg2:rgba(255,255,255,.06);--card:rgba(255,255,255,.055);--cardHi:rgba(255,255,255,.10);
    --line:rgba(255,255,255,.10);--glassB:rgba(255,255,255,.13);
    --gold:#C9A24A;--goldSoft:#E3C272;--steel:#6E8DBA;--text:#F4F1E9;--mut:#97A1B6;--green:#5FB890;--red:#E0908F;
    --safeT:env(safe-area-inset-top,0px);--safeB:env(safe-area-inset-bottom,0px);--nav:70px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'Hanken Grotesk',ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;min-height:100dvh;position:relative;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:
    radial-gradient(55% 45% at 12% -5%,rgba(201,162,74,.14),transparent 60%),
    radial-gradient(65% 55% at 105% 12%,rgba(110,141,186,.16),transparent 62%),
    radial-gradient(120% 90% at 50% 118%,rgba(201,162,74,.08),transparent 70%),var(--bg);}
  input,select{font-family:inherit;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
  input[type=number]{-moz-appearance:textfield;}
  ::selection{background:var(--gold);color:var(--bg);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  svg{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes sheetUp{from{transform:translateY(100%);}to{transform:none;}}
  .wrap{max-width:500px;margin:0 auto;padding-bottom:calc(var(--nav) + var(--safeB) + 40px);}
  .wrap.session{padding-bottom:calc(100px + var(--safeB));}
  .pad{padding-left:22px;padding-right:22px;}
  .fade{animation:fadeUp .4s cubic-bezier(.2,.8,.2,1) both;}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .mut{color:var(--mut);}.gold{color:var(--gold);}.goldS{color:var(--goldSoft);}
  .xs{font-size:12.5px;}.sm{font-size:14.5px;}.lg{font-size:20px;}.xl{font-size:25px;}
  .b6{font-weight:600;}.b7{font-weight:700;}.b8{font-weight:800;}
  .up{text-transform:uppercase;letter-spacing:.08em;}
  .tab{font-variant-numeric:tabular-nums;}
  .cap{text-transform:capitalize;}
  .card{background:var(--card);border:1px solid var(--glassB);border-radius:24px;backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 10px 28px rgba(0,0,0,.30);}
  .badge{border:1px solid var(--line);border-radius:10px;padding:3px 9px;}
  .top{padding-top:calc(30px + var(--safeT));}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand h1{font-weight:800;letter-spacing:.14em;font-size:24px;}
  .ghost{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--glassB);color:var(--mut);border-radius:16px;padding:11px 15px;font-size:12.5px;backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-top:26px;}
  .stat{background:var(--card);border:1px solid var(--glassB);border-radius:22px;padding:15px;backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 10px 28px rgba(0,0,0,.28);}
  .stat .v{font-weight:800;font-size:23px;}
  .scard{width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--glassB);border-radius:24px;padding:18px;transition:.18s;backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 10px 28px rgba(0,0,0,.28);}
  .scard.hi{background:linear-gradient(180deg,rgba(201,162,74,.20),rgba(201,162,74,.07));border-color:rgba(201,162,74,.55);box-shadow:0 1px 0 rgba(255,255,255,.10) inset,0 12px 30px rgba(201,162,74,.14);}
  .chip{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:15px;background:var(--bg2);color:var(--gold);font-weight:800;font-size:17px;}
  .scard.hi .chip{background:var(--gold);color:#1a1407;}
  .label{color:var(--mut);font-size:12.5px;text-transform:uppercase;letter-spacing:.09em;margin:26px 0 9px;}
  .stack{display:flex;flex-direction:column;gap:13px;}
  .deload{margin-top:18px;padding:17px;border-radius:22px;background:linear-gradient(180deg,rgba(227,194,114,.16),rgba(227,194,114,.05));border:1px solid rgba(227,194,114,.42);display:flex;gap:12px;align-items:flex-start;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
  .deload .btn{margin-top:11px;background:var(--goldSoft);color:#1a1407;font-weight:700;border-radius:999px;padding:8px 16px;font-size:12.5px;}
  .shead{position:sticky;top:0;z-index:30;background:rgba(10,16,24,.72);border-bottom:1px solid var(--line);padding:calc(26px + var(--safeT)) 22px 14px;backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);}
  .prog{margin-top:13px;height:7px;border-radius:999px;background:rgba(0,0,0,.25);overflow:hidden;}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--goldSoft));width:0%;transition:width .35s;}
  .ex{background:var(--card);border:1px solid var(--glassB);border-radius:22px;overflow:hidden;backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);box-shadow:0 10px 26px rgba(0,0,0,.26);}
  .ex .h{padding:17px 17px 13px;}
  .ex h3{font-weight:700;font-size:15px;line-height:1.35;}
  .restbtn{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:5px 11px;margin-left:auto;}
  .note{color:var(--mut);background:rgba(0,0,0,.20);font-size:12.5px;margin-top:9px;padding:11px;border-radius:12px;line-height:1.55;}
  .setrow{display:flex;align-items:center;gap:9px;padding:12px 17px;border-top:1px solid var(--line);}
  .field{display:flex;align-items:center;gap:5px;padding:9px 11px;border-radius:13px;background:rgba(0,0,0,.22);border:1px solid var(--line);width:86px;}
  .field input{background:transparent;color:var(--text);width:100%;outline:none;border:none;font-weight:700;font-size:15.5px;font-variant-numeric:tabular-nums;}
  .check{margin-left:auto;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:13px;background:rgba(0,0,0,.20);border:1px solid var(--line);color:var(--mut);transition:.15s;}
  .check.done{background:var(--green);border-color:var(--green);color:#04130c;}
  .finish{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:14px 22px calc(14px + var(--safeB));background:rgba(10,16,24,.72);border-top:1px solid var(--line);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);}
  .finish .inner{max-width:500px;margin:0 auto;}
  .finish button{width:100%;padding:16px;border-radius:18px;background:linear-gradient(180deg,#D8B25E,#C9A24A);color:#1a1407;font-weight:800;letter-spacing:.02em;font-size:15.5px;box-shadow:0 6px 18px rgba(201,162,74,.30),0 1px 0 rgba(255,255,255,.4) inset;}
  .hentry{width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--glassB);border-radius:22px;padding:17px;backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);box-shadow:0 10px 26px rgba(0,0,0,.26);}
  .chartbox{margin-top:18px;padding:17px;border-radius:22px;background:var(--card);border:1px solid var(--glassB);backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);}
  .seg{display:flex;gap:5px;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:17px;padding:5px;margin-top:20px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
  .seg button{flex:1;padding:12px;border-radius:13px;font-size:14.5px;font-weight:600;color:var(--mut);transition:.15s;}
  .seg button.on{background:var(--cardHi);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.10) inset,0 4px 12px rgba(0,0,0,.25);}
  .rings{display:flex;gap:14px;margin-top:18px;}
  .ringcard{flex:1;background:var(--card);border:1px solid var(--glassB);border-radius:22px;padding:16px;display:flex;flex-direction:column;align-items:center;backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);box-shadow:0 10px 26px rgba(0,0,0,.26);}
  .ringwrap{position:relative;width:96px;height:96px;}
  .ringval{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ringval b{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
  .ringval span{font-size:11.5px;color:var(--mut);margin-top:3px;}
  .datenav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;background:var(--card);border:1px solid var(--glassB);border-radius:17px;padding:9px 11px;backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);}
  .datenav button{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:var(--mut);}
  .datenav button:disabled{opacity:.3;}
  .li{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--glassB);border-radius:20px;padding:16px;backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);box-shadow:0 8px 22px rgba(0,0,0,.22);}
  .li .x{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--mut);border:1px solid var(--line);flex:none;margin-left:11px;}
  .iconbtn{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);color:var(--mut);background:rgba(0,0,0,.16);}
  .addbtn{width:100%;padding:16px;border-radius:18px;border:1px dashed var(--glassB);color:var(--goldSoft);font-weight:600;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,.04);}
  .linkbtn{font-size:12.5px;color:var(--mut);text-decoration:underline;text-underline-offset:2px;}
  .supp{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--glassB);border-radius:20px;padding:15px 16px;backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);box-shadow:0 8px 22px rgba(0,0,0,.22);}
  .sbox{flex:none;width:30px;height:30px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.20);display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .sbox.on{background:var(--green);border-color:var(--green);}
  .train-tag{font-size:10.5px;color:var(--goldSoft);border:1px solid var(--line);border-radius:7px;padding:2px 6px;margin-left:7px;vertical-align:middle;}
  #modal.show{position:fixed;inset:0;z-index:80;display:flex;align-items:flex-end;justify-content:center;background:rgba(3,7,15,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
  .sheet{width:100%;max-width:500px;background:rgba(18,28,46,.82);border:1px solid var(--glassB);border-bottom:none;border-radius:28px 28px 0 0;padding:20px 20px calc(20px + var(--safeB));animation:sheetUp .3s cubic-bezier(.2,.8,.2,1) both;max-height:86vh;overflow-y:auto;backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);box-shadow:0 -10px 40px rgba(0,0,0,.45);}
  .sheet h3{font-weight:800;font-size:17px;}
  .mfield{display:flex;flex-direction:column;gap:6px;}
  .mfield label{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;}
  .mfield input,.mfield select{background:rgba(0,0,0,.24);border:1px solid var(--line);border-radius:14px;padding:13px 14px;color:var(--text);font-size:16px;outline:none;}
  .mfield input:focus,.mfield select:focus{border-color:var(--gold);}
  .primary{width:100%;padding:15px;border-radius:16px;background:linear-gradient(180deg,#D8B25E,#C9A24A);color:#1a1407;font-weight:800;font-size:15.5px;box-shadow:0 6px 18px rgba(201,162,74,.30),0 1px 0 rgba(255,255,255,.4) inset;}
  .stepper{display:flex;align-items:center;gap:16px;justify-content:center;}
  .stepper button{width:52px;height:52px;border-radius:16px;background:var(--cardHi);border:1px solid var(--glassB);font-size:26px;font-weight:700;color:var(--goldSoft);}
  .stepper .q{font-size:30px;font-weight:800;min-width:66px;text-align:center;font-variant-numeric:tabular-nums;}
  .foodrow{width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--glassB);border-radius:16px;padding:14px 15px;}
  .nav{position:fixed;left:14px;right:14px;bottom:calc(10px + var(--safeB));z-index:55;background:rgba(16,26,44,.72);border:1px solid var(--glassB);border-radius:30px;backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);box-shadow:0 10px 34px rgba(0,0,0,.42),0 1px 0 rgba(255,255,255,.08) inset;}
  .nav .inner{max-width:500px;margin:0 auto;height:var(--nav);display:flex;padding:8px 6px;}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--mut);font-size:11px;font-weight:600;border-radius:22px;margin:0 4px;transition:.18s;}
  .nav button.on{color:var(--gold);background:rgba(201,162,74,.15);}
  .pill{position:fixed;left:0;right:0;display:flex;justify-content:center;z-index:70;}
  .pill .inner{display:flex;align-items:center;gap:13px;padding:10px 18px;border-radius:999px;background:rgba(24,41,74,.82);border:1px solid var(--glassB);backdrop-filter:blur(24px) saturate(170%);-webkit-backdrop-filter:blur(24px) saturate(170%);box-shadow:0 10px 34px rgba(0,0,0,.5);}
  .pill .t{font-weight:700;font-variant-numeric:tabular-nums;min-width:46px;font-size:15px;}
  .pill .add{font-size:12.5px;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:5px 10px;}
  #toast{position:fixed;left:0;right:0;bottom:calc(var(--nav) + var(--safeB) + 28px);display:flex;justify-content:center;z-index:90;}
  #toast .inner{padding:10px 18px;border-radius:999px;background:var(--green);color:#04130c;font-weight:600;font-size:14.5px;box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .hidden{display:none;}
  .caveat{font-size:12px;color:var(--mut);line-height:1.6;margin-top:20px;padding:14px;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:14px;}
</style>
</head>

  <div id="modal"></div>

function dayTotals(){return dayEntries().reduce((t,e)=>({kcal:t.kcal+e.kcal,p:t.p+e.p,c:t.c+e.c,f:t.f+e.f}),{kcal:0,p:0,c:0,f:0});}
function ring(val,target,color){
  const r=34,circ=2*Math.PI*r,pct=Math.max(0,Math.min(1,target?val/target:0)),off=circ*(1-pct);
  return '<svg width="92" height="92" viewBox="0 0 92 92"><circle cx="46" cy="46" r="'+r+'" fill="none" stroke="'+C("--bg2")+'" stroke-width="8"/><circle cx="46" cy="46" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 46 46)"/></svg>';
}
function renderNutri(){
  const seg='<div class="seg"><button data-act="nsub" data-sub="meals" class="'+(S.nutriSub==="meals"?"on":"")+'">Repas</button><button data-act="nsub" data-sub="supps" class="'+(S.nutriSub==="supps"?"on":"")+'">Compléments</button></div>';
  let body;
  if(S.nutriSub==="supps")body=nutriSupps();
  else if(S.foodsOpen)body=nutriFoods();
  else body=nutriMeals();
  return '<div class="wrap"><div class="pad top fade"><div class="row between"><h2 class="b8 xl">Nutrition</h2></div>'+seg+body+'</div></div>';
}
function nutriMeals(){
  const t=dayTotals(),isToday=S.nutriDate===isoToday(),entries=dayEntries();
  const list=entries.length?entries.map((e,i)=>'<div class="li"><div style="min-width:0"><p class="b6 sm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.name)+(e.qty!==1?' <span class="mut">×'+r1(e.qty)+'</span>':"")+'</p><p class="mut xs" style="margin-top:2px">'+Math.round(e.kcal)+' kcal · P '+r1(e.p)+' · G '+r1(e.c)+' · L '+r1(e.f)+'</p></div><button class="x" data-act="del-log" data-i="'+i+'">'+I.x(C("--mut"),14)+'</button></div>').join(""):'<p class="mut sm" style="text-align:center;padding:22px 0">Aucun aliment pour ce jour.</p>';
  return '<div class="datenav"><button data-act="ndate" data-dir="-1">'+I.cl(C("--mut"))+'</button><span class="b7 sm cap">'+(isToday?"Aujourd'hui":fmtDateLong(S.nutriDate))+'</span><button data-act="ndate" data-dir="1" '+(isToday?"disabled":"")+'>'+I.cr(C("--mut"))+'</button></div>'+
    '<div class="rings"><div class="ringcard"><div class="ringwrap">'+ring(t.p,targets.protein,C("--gold"))+'<div class="ringval"><b>'+Math.round(t.p)+'</b><span>/ '+targets.protein+' g</span></div></div><p class="b6 sm" style="margin-top:8px">Protéines</p></div><div class="ringcard"><div class="ringwrap">'+ring(t.kcal,targets.kcal,C("--steel"))+'<div class="ringval"><b>'+Math.round(t.kcal)+'</b><span>/ '+targets.kcal+'</span></div></div><p class="b6 sm" style="margin-top:8px">Calories</p></div></div>'+
    '<div class="row between" style="margin-top:10px;padding:0 4px"><span class="mut xs">Glucides '+Math.round(t.c)+' g · Lipides '+Math.round(t.f)+' g</span><button class="linkbtn" data-act="open-target">Objectifs</button></div>'+
    '<p class="label" style="margin-top:18px">Journée</p><div class="stack">'+list+'</div>'+
    '<div style="margin-top:12px"><button class="addbtn" data-act="open-picker">'+I.plus(C("--goldSoft"))+' Ajouter un aliment</button></div>'+
    '<div class="row between" style="margin-top:14px;padding:0 4px"><button class="linkbtn" data-act="open-foods">Gérer mes aliments</button><span class="mut xs">Déficit modéré · ~190 g protéines</span></div>';
}
function nutriFoods(){
  const list=foods.map(f=>'<div class="li"><div style="min-width:0"><p class="b6 sm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.name)+'</p><p class="mut xs" style="margin-top:2px">'+f.kcal+' kcal · P '+r1(f.p)+' · G '+r1(f.c)+' · L '+r1(f.f)+' / '+esc(f.unit||"unité")+'</p></div><div class="row" style="gap:8px"><button class="iconbtn" data-act="edit-food" data-id="'+f.id+'">'+I.edit(C("--mut"))+'</button><button class="iconbtn" data-act="del-food" data-id="'+f.id+'">'+I.trash(C("--mut"))+'</button></div></div>').join("");

}
function nutriSupps(){
  const st=load(KSU,{date:"",ids:[]});const ids=(st.date===isoToday())?st.ids:[];const done=ids.length;
  const groups=SUPP.map(g=>'<p class="label">'+g.g+'</p><div class="stack">'+g.items.map(it=>'<div class="supp"><button class="sbox '+(ids.includes(it.id)?"on":"")+'" data-act="supp" data-id="'+it.id+'">'+I.check(ids.includes(it.id)?"#04130c":"transparent")+'</button><div style="flex:1;min-width:0"><p class="b6 sm">'+esc(it.n)+(it.train?'<span class="train-tag">sport</span>':"")+'</p><button class="linkbtn" style="margin-top:3px" data-act="supp-note" data-id="'+it.id+'">détail</button><p class="note hidden" id="snote-'+it.id+'">'+esc(it.note)+'</p></div></div>').join("")+'</div>').join("");
  return '<div class="row between" style="margin-top:16px;padding:0 4px"><span class="mut sm">Routine du jour</span><span class="goldS b7 sm tab">'+done+'/'+SUPP_TOTAL+' pris</span></div>'+groups+'<p class="caveat">L\'espacement Levothyrox / minéraux et l\'arrêt de la biotine avant analyse de sang sont à confirmer avec ton pharmacien ou ton endocrinologue. La checklist se remet à zéro chaque jour.</p>';
}
/* ===== MESURES ===== */
function renderMeasure(){
  if(S.measureView==="detail")return measureDetail();
  const list=measures.map(m=>{
    const h=m.history||[],last=h.length?h[h.length-1]:null,due=!last||daysSince(last.date)>=m.freq;
    const valTxt=m.isPhoto?(last?"Dernières : "+fmtDate(last.date):"Jamais"):(last?r1(last.value)+" "+m.unit:"—");
    return '<button class="li" style="text-align:left" data-act="open-metric" data-id="'+m.id+'"><div><p class="b7 sm">'+esc(m.name)+'</p><p class="mut xs" style="margin-top:3px">'+freqLabel(m.freq)+' · '+valTxt+'</p></div><div class="row" style="gap:10px">'+(due?'<span class="badge" style="color:var(--goldSoft);border-color:var(--goldSoft);font-size:11px">À mesurer</span>':'<span class="badge mut" style="font-size:11px">À jour</span>')+I.cr(C("--mut"))+'</div></button>';
  }).join("");
  return '<div class="wrap"><div class="pad top fade"><h2 class="b8 xl">Mesures</h2><p class="mut xs" style="margin-top:5px">Recomposition : juge la tendance, pas le chiffre du jour.</p><p class="label">Mes mesures</p><div class="stack">'+list+'</div><div style="margin-top:12px"><button class="addbtn" data-act="open-addmetric">'+I.plus(C("--goldSoft"))+' Nouvelle mesure</button></div><p class="caveat">Le poids est volontairement hebdomadaire : avec la créatine et l\'Hashimoto, le poids quotidien fluctue trop. Le tour de taille est ton meilleur indicateur de recomposition. Les photos restent dans ton app Photos — l\'app n\'enregistre que la date.</p></div></div>';
}
function measureDetail(){
  const m=measures.find(x=>x.id===S.measureSel);if(!m){S.measureView="list";return renderMeasure();}
  const h=(m.history||[]).slice().sort((a,b)=>a.date<b.date?-1:1),last=h.length?h[h.length-1]:null,due=!last||daysSince(last.date)>=m.freq;
  let chart="";if(!m.isPhoto&&h.length>=2)chart='<div class="chartbox"><p class="mut xs up" style="margin-bottom:10px">Évolution ('+m.unit+')</p>'+chartLine(h.map(e=>e.value))+'</div>';
  const hist=h.length?[...h].reverse().map(e=>'<div class="li"><span class="sm cap mut">'+fmtDate(e.date)+'</span>'+(m.isPhoto?'<span class="goldS">'+I.camera(C("--goldSoft"))+'</span>':'<span class="b7 sm goldS tab">'+r1(e.value)+' '+m.unit+'</span>')+'</div>').join(""):'<p class="mut sm" style="text-align:center;padding:18px 0">Aucune entrée.</p>';
  const logBtn=m.isPhoto?'<button class="addbtn" data-act="log-photo">'+I.camera(C("--goldSoft"))+' J\'ai pris mes photos aujourd\'hui</button>':'<button class="addbtn" data-act="open-logm">'+I.plus(C("--goldSoft"))+' Nouvelle entrée</button>';
  return '<div class="wrap"><div class="pad top fade"><button class="row mut sm" style="gap:4px" data-act="mback">'+I.cl(C("--mut"))+' Mesures</button><div class="row between" style="margin-top:14px"><div><h2 class="b8 lg">'+esc(m.name)+'</h2><p class="mut xs" style="margin-top:4px">'+freqLabel(m.freq)+'</p></div>'+(due?'<span class="badge" style="color:var(--goldSoft);border-color:var(--goldSoft);font-size:11px">À mesurer</span>':"")+'</div>'+(m.isPhoto?'<p class="caveat" style="margin-top:14px">Prends 3 photos (face, profil, dos), même lumière, le matin à jeun. Compare-les tous les mois — c\'est le juge de paix de la recomposition.</p>':"")+chart+'<div style="margin-top:16px">'+logBtn+'</div><p class="label">Historique</p><div class="stack">'+hist+'</div>'+(!MEASURE_DEFAULTS.some(d=>d.id===m.id)?'<button data-act="del-metric" data-id="'+m.id+'" style="display:block;margin:24px auto 0;color:var(--red);font-size:12px">Supprimer cette mesure</button>':"")+'</div></div>';
}

/* ===== actions ===== */
function startSession(id){
  const sets=PROGRAM[id].ex.map(ex=>{const prev=lastPerf(ex.n);return Array.from({length:ex.s},(_,i)=>({weight:prev?String((prev[i]||prev[0]).weight):"",reps:"",done:false}));});
  S.active={sessionId:id,startedAt:new Date().toISOString(),sets};save(KA,S.active);S.trainView="session";render();
}
function updateProgress(){let total=0,done=0;S.active.sets.forEach(rows=>rows.forEach(r=>{total++;if(r.done)done++;}));const p=document.getElementById("prog");if(p)p.style.width=(total?Math.round(done/total*100):0)+"%";const c=document.getElementById("count");if(c)c.textContent=done+"/"+total+" séries";}
function finishSession(){
  const s=PROGRAM[S.active.sessionId];
  const exercises=s.ex.map((ex,ei)=>({n:ex.n,sets:S.active.sets[ei].filter(r=>r.weight!==""&&r.reps!=="").map(r=>({weight:num(r.weight),reps:parseInt(r.reps)}))})).filter(e=>e.sets.length);
  const volume=exercises.reduce((t,e)=>t+e.sets.reduce((a,x)=>a+x.weight*x.reps,0),0);
  logs.push({id:Date.now(),date:new Date().toISOString(),sessionId:S.active.sessionId,exercises,volume});save(KL,logs);
  S.active=null;save(KA,null);S.trainView="home";render();toast("Séance enregistrée ✓");
}
function addLogged(food,qty){
  const e={name:food.name,qty,kcal:r1(food.kcal*qty),p:r1(food.p*qty),c:r1(food.c*qty),f:r1(food.f*qty)};
  const arr=nutriLog[S.nutriDate]?[...nutriLog[S.nutriDate]]:[];arr.push(e);nutriLog[S.nutriDate]=arr;save(KN,nutriLog);
}
const pill=document.getElementById("pill");
function startRest(sec){S.rest=sec;showPill();if(S.restTimer)clearInterval(S.restTimer);S.restTimer=setInterval(()=>{S.rest--;if(S.rest<=0)stopRest();else showPill();},1000);}
function stopRest(){if(S.restTimer)clearInterval(S.restTimer);S.restTimer=null;S.rest=null;pill.classList.add("hidden");}
function showPill(){const inSession=(S.tab==="train"&&S.trainView==="session");const bottom=(inSession?92:96)+parseInt(C("--safeB")||0);pill.style.bottom=bottom+"px";pill.innerHTML='<div class="inner">'+I.timer(C("--gold"))+'<span class="t">'+mmss(S.rest)+'</span><button class="add" data-act="rest-add">+30s</button><button data-act="rest-close">'+I.x(C("--mut"))+'</button></div>';pill.classList.remove("hidden");}
let toastT=null;
function toast(m){const t=document.getElementById("toast");t.innerHTML='<div class="inner">'+m+'</div>';t.classList.remove("hidden");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.add("hidden"),2200);}
/* ===== events: page ===== */
app.addEventListener("input",e=>{const t=e.target;if(t.dataset&&t.dataset.field!==undefined)S.active.sets[+t.dataset.ex][+t.dataset.set][t.dataset.field]=t.value;});
app.addEventListener("change",e=>{if(e.target.dataset&&e.target.dataset.field!==undefined)save(KA,S.active);});
app.addEventListener("click",e=>{
  const b=e.target.closest("[data-act]");if(!b)return;const a=b.dataset.act;
  if(a==="tab"){S.tab=b.dataset.tab;if(S.tab==="nutri")S.foodsOpen=false;render();return;}
  if(a==="tview"){S.trainView=b.dataset.v;render();return;}
  if(a==="start"){startSession(b.dataset.id);return;}
  if(a==="deload"){deload=logs.length;save(KD,deload);render();toast("Deload validé — compteur remis à zéro");return;}
  if(a==="quit"){save(KA,S.active);S.active=null;save(KA,null);S.trainView="home";render();return;}
  if(a==="finish"){finishSession();return;}
  if(a==="reset-train"){if(confirm("Effacer tout l'historique d'entraînement ?")){logs=[];deload=0;save(KL,logs);save(KD,0);S.trainView="home";render();toast("Entraînement réinitialisé");}return;}
  if(a==="open-train"){S.detail=logs.find(l=>l.id==b.dataset.id);S.trainView="detail";render();return;}
  if(a==="note"){const n=document.getElementById("note-"+b.dataset.ex);if(n)n.classList.toggle("hidden");return;}
  if(a==="rest"){startRest(+b.dataset.sec);return;}
  if(a==="toggle"){const ei=+b.dataset.ex,si=+b.dataset.set,row=S.active.sets[ei][si];row.done=!row.done;save(KA,S.active);b.classList.toggle("done",row.done);b.innerHTML=I.check(row.done?"#04130c":C("--mut"));updateProgress();return;}
  if(a==="nsub"){S.nutriSub=b.dataset.sub;S.foodsOpen=false;render();return;}
  if(a==="ndate"){const ni=addISO(S.nutriDate,+b.dataset.dir);if(ni<=isoToday())S.nutriDate=ni;render();return;}
  if(a==="open-target"){modalTarget();return;}
  if(a==="open-picker"){S.pickFood=null;S.pickQty=1;modalPicker();return;}
  if(a==="open-foods"){S.foodsOpen=true;render();return;}
  if(a==="close-foods"){S.foodsOpen=false;render();return;}
  if(a==="open-addfood"){modalAddFood(null);return;}
  if(a==="edit-food"){modalAddFood(b.dataset.id);return;}
  if(a==="del-food"){if(confirm("Supprimer cet aliment de ta bibliothèque ?")){foods=foods.filter(x=>x.id!==b.dataset.id);save(KF,foods);render();}return;}
  if(a==="del-log"){const arr=[...dayEntries()];arr.splice(+b.dataset.i,1);nutriLog[S.nutriDate]=arr;save(KN,nutriLog);render();return;}
  if(a==="supp"){const st=load(KSU,{date:"",ids:[]});let ids=(st.date===isoToday())?st.ids.slice():[];const id=b.dataset.id,i=ids.indexOf(id);if(i>=0)ids.splice(i,1);else ids.push(id);save(KSU,{date:isoToday(),ids});render();return;}
  if(a==="supp-note"){const n=document.getElementById("snote-"+b.dataset.id);if(n)n.classList.toggle("hidden");return;}
  if(a==="open-metric"){S.measureSel=b.dataset.id;S.measureView="detail";render();return;}
  if(a==="mback"){S.measureView="list";S.measureSel=null;render();return;}
  if(a==="open-logm"){modalLogMeasure();return;}
  if(a==="log-photo"){const m=measures.find(x=>x.id===S.measureSel),d=isoToday();m.history=(m.history||[]).filter(e=>e.date!==d).concat([{date:d}]);m.history.sort((x,y)=>x.date<y.date?-1:1);save(KM,measures);render();toast("Photos notées ✓");return;}
  if(a==="del-metric"){if(confirm("Supprimer cette mesure et son historique ?")){measures=measures.filter(x=>x.id!==b.dataset.id);save(KM,measures);S.measureView="list";S.measureSel=null;render();}return;}
  if(a==="open-addmetric"){modalAddMetric();return;}
});
/* ===== events: modal ===== */
modalEl.addEventListener("click",e=>{
  const b=e.target.closest("[data-act]");
  if(!b){if(!e.target.closest("[data-stop]"))closeModal();return;}
  const a=b.dataset.act;
  if(a==="modal-close"){closeModal();return;}
  if(a==="pick"){S.pickFood=b.dataset.id;S.pickQty=1;modalPicker();return;}
  if(a==="pick-back"){S.pickFood=null;modalPicker();return;}
  if(a==="qty"){S.pickQty=Math.max(0.5,r1(S.pickQty+parseFloat(b.dataset.d)));modalPicker();return;}
  if(a==="add-logged"){const f=foods.find(x=>x.id===S.pickFood);addLogged(f,S.pickQty);closeModal();render();toast("Ajouté ✓");return;}
  if(a==="open-custom"){modalCustom();return;}
  if(a==="add-custom"){const name=(document.getElementById("c-name").value||"").trim()||"Aliment";addLogged({name,kcal:num(document.getElementById("c-kcal").value),p:num(document.getElementById("c-p").value),c:num(document.getElementById("c-c").value),f:num(document.getElementById("c-f").value)},1);closeModal();render();toast("Ajouté ✓");return;}
  if(a==="save-target"){targets={protein:Math.max(0,parseInt(document.getElementById("t-prot").value)||TARGET_DEFAULT.protein),kcal:Math.max(0,parseInt(document.getElementById("t-kcal").value)||TARGET_DEFAULT.kcal)};save(KT,targets);closeModal();render();toast("Objectifs mis à jour");return;}
  if(a==="save-food"){const id=document.getElementById("f-id").value;const obj={name:(document.getElementById("f-name").value||"").trim()||"Aliment",unit:(document.getElementById("f-unit").value||"").trim()||"unité",kcal:num(document.getElementById("f-kcal").value),p:num(document.getElementById("f-p").value),c:num(document.getElementById("f-c").value),f:num(document.getElementById("f-f").value)};if(id){const i=foods.findIndex(x=>x.id===id);if(i>=0)foods[i]={...foods[i],...obj};}else{foods.push({id:"f"+Date.now(),...obj});}save(KF,foods);closeModal();S.foodsOpen=true;render();toast("Aliment enregistré");return;}
  if(a==="save-logm"){const m=measures.find(x=>x.id===S.measureSel),v=num(document.getElementById("m-val").value),d=document.getElementById("m-date").value||isoToday();if(v>0){m.history=(m.history||[]).filter(e=>e.date!==d).concat([{date:d,value:v}]);m.history.sort((x,y)=>x.date<y.date?-1:1);save(KM,measures);closeModal();render();toast("Mesure enregistrée ✓");}else closeModal();return;}
  if(a==="save-metric"){const name=(document.getElementById("nm-name").value||"").trim();if(name){measures.push({id:"m"+Date.now(),name,unit:(document.getElementById("nm-unit").value||"").trim(),freq:parseInt(document.getElementById("nm-freq").value)||14,history:[]});save(KM,measures);}closeModal();render();return;}
});
pill.addEventListener("click",e=>{const b=e.target.closest("[data-act]");if(!b)return;if(b.dataset.act==="rest-add"){S.rest+=30;showPill();}else if(b.dataset.act==="rest-close")stopRest();});
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
render();
</script>
</body>
